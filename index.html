<!DOCTYPE html>
<html>
<head>
  <title>HOLA</title>
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    width="100%"
    height="100%"
    allowfullscreen="true"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
  </iframe>

  <script>
    window.onload = function() {
      document.querySelector('iframe')

    };
  </script>
